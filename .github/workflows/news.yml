name: Telegram News Bot

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: "1"   # 🔥 IMPORTANT FIX

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔥 SHOW EXACT FILES (DEBUG)
      - name: Debug Repository Files
        run: ls -R

      # 🔥 SHOW PYTHON VERSION
      - name: Check Python
        run: python --version

      # 🔥 RUN BOT (REAL-TIME OUTPUT ENABLED)
      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python -u news.py
